services:
  mysql:
    image: mysql:8
    container_name: dentix-mysql
    restart: always
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: dentix-backend
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_CRYPTO_SECRET_KEY: ${APP_CRYPTO_SECRET_KEY}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sistema_gestao_consultas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ${FRONTEND_PATH:-../gestao-dental}
    container_name: dentix-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  mysql_data: